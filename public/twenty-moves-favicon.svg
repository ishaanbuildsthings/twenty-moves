<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Rounded background -->
  <rect width="512" height="512" rx="96" fill="#1A1A2E"/>

  <!-- Isometric cube - three visible faces -->
  <!-- Top face -->
  <polygon points="256,100 400,180 256,260 112,180" fill="#3B82F6"/>
  <!-- Left face -->
  <polygon points="112,180 256,260 256,404 112,324" fill="#E53E3E"/>
  <!-- Right face -->
  <polygon points="256,260 400,180 400,324 256,404" fill="#F5F5F5"/>

  <!-- Grid lines on top face -->
  <line x1="208" y1="127" x2="208" y2="127" stroke="#1A1A2E" stroke-width="2"/>
  <line x1="160" y1="153" x2="304" y2="233" stroke="#1A1A2E" stroke-width="2.5" opacity="0.3"/>
  <line x1="208" y1="127" x2="352" y2="207" stroke="#1A1A2E" stroke-width="2.5" opacity="0.3"/>
  <line x1="184" y1="220" x2="328" y2="140" stroke="#1A1A2E" stroke-width="2.5" opacity="0.3"/>
  <line x1="220" y1="240" x2="364" y2="160" stroke="#1A1A2E" stroke-width="2.5" opacity="0.3"/>

  <!-- Grid lines on left face -->
  <line x1="112" y1="228" x2="256" y2="308" stroke="#1A1A2E" stroke-width="2.5" opacity="0.3"/>
  <line x1="112" y1="276" x2="256" y2="356" stroke="#1A1A2E" stroke-width="2.5" opacity="0.3"/>
  <line x1="160" y1="204" x2="160" y2="348" stroke="#1A1A2E" stroke-width="2.5" opacity="0.3"/>
  <line x1="208" y1="228" x2="208" y2="372" stroke="#1A1A2E" stroke-width="2.5" opacity="0.3"/>

  <!-- Grid lines on right face -->
  <line x1="256" y1="308" x2="400" y2="228" stroke="#1A1A2E" stroke-width="2.5" opacity="0.3"/>
  <line x1="256" y1="356" x2="400" y2="276" stroke="#1A1A2E" stroke-width="2.5" opacity="0.3"/>
  <line x1="304" y1="228" x2="304" y2="372" stroke="#1A1A2E" stroke-width="2.5" opacity="0.3"/>
  <line x1="352" y1="204" x2="352" y2="348" stroke="#1A1A2E" stroke-width="2.5" opacity="0.3"/>

  <!-- "20" text on the right face, skewed to match perspective -->
  <g transform="translate(328, 290)">
    <text font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="72" fill="#1A1A2E" opacity="0.7" text-anchor="middle" dominant-baseline="central" transform="skewY(-33.7) scale(0.85, 1)">20</text>
  </g>

  <!-- Subtle edge highlights -->
  <line x1="256" y1="100" x2="400" y2="180" stroke="#fff" stroke-width="2" opacity="0.15"/>
  <line x1="256" y1="100" x2="112" y2="180" stroke="#fff" stroke-width="2" opacity="0.15"/>
  <line x1="256" y1="260" x2="256" y2="404" stroke="#1A1A2E" stroke-width="3" opacity="0.3"/>
</svg>
